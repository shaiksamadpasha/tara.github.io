<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Birthday 🌌</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff4da6;
    --violet: #9b5de5;
    --gold: #ffd700;
    --cyan: #00f5ff;
    --soft-pink: #ffd6ff;
    --deep: #05010d;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--deep);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: white;
    cursor: default;
  }

  #starCanvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  .nebula {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 50% at 15% 20%, rgba(155,93,229,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 85% 75%, rgba(255,77,166,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 50% 50%, rgba(0,245,255,0.05) 0%, transparent 70%);
  }

  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 1.8s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── START SCREEN ── */
  #startScreen { flex-direction: column; }

  .orbit-ring {
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.06);
    animation: spinOrbit linear infinite; pointer-events: none;
  }
  .orbit-ring:nth-child(1) { width:320px; height:320px; animation-duration:18s; }
  .orbit-ring:nth-child(2) { width:480px; height:480px; animation-duration:30s; animation-direction:reverse; }
  .orbit-ring:nth-child(3) { width:640px; height:640px; animation-duration:45s; }
  @keyframes spinOrbit { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .orbit-dot {
    position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--pink); box-shadow: 0 0 12px var(--pink);
  }
  .orbit-ring:nth-child(2) .orbit-dot { background: var(--violet); box-shadow: 0 0 12px var(--violet); }
  .orbit-ring:nth-child(3) .orbit-dot { background: var(--cyan); box-shadow: 0 0 12px var(--cyan); }

  .start-center {
    position: relative; display: flex; flex-direction: column;
    align-items: center; gap: 18px; z-index: 2;
  }

  .cake-emoji {
    font-size: 90px;
    filter: drop-shadow(0 0 30px rgba(255,77,166,0.8));
    animation: cakePulse 2s ease-in-out infinite;
  }
  @keyframes cakePulse {
    0%,100%{transform:scale(1); filter:drop-shadow(0 0 30px rgba(255,77,166,0.8));}
    50%{transform:scale(1.06); filter:drop-shadow(0 0 50px rgba(255,77,166,1));}
  }

  .flame-container { display: flex; justify-content: center; gap: 18px; margin-bottom: 4px; }
  .flame {
    width: 12px; height: 22px;
    background: radial-gradient(ellipse at 50% 100%, #fff 0%, #ffe066 30%, #ff9900 60%, rgba(255,50,0,0) 100%);
    border-radius: 50% 50% 30% 30% / 60% 60% 30% 30%;
    animation: flicker 0.13s infinite alternate;
    box-shadow: 0 0 14px #ff9900, 0 0 28px rgba(255,150,0,0.4);
  }
  @keyframes flicker {
    from { transform: scaleX(1) scaleY(1) rotate(-2deg); opacity: 1; }
    to   { transform: scaleX(0.85) scaleY(1.15) rotate(2deg); opacity: 0.9; }
  }

  .start-title {
    font-family: 'Cinzel', serif; font-size: clamp(22px, 4vw, 38px);
    letter-spacing: 0.22em; color: var(--soft-pink);
    text-shadow: 0 0 30px rgba(255,77,166,0.6);
  }
  .start-sub {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 17px; color: rgba(255,214,255,0.6); letter-spacing: 0.08em;
  }

  .blow-btn {
    margin-top: 8px; padding: 14px 36px;
    font-family: 'Cinzel', serif; font-size: 16px; letter-spacing: 0.18em;
    border: 1px solid rgba(255,77,166,0.5); border-radius: 50px;
    background: rgba(255,77,166,0.12); color: var(--soft-pink);
    cursor: pointer; position: relative; overflow: hidden;
    transition: all 0.35s ease; backdrop-filter: blur(8px);
  }
  .blow-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,77,166,0.25), rgba(155,93,229,0.25));
    opacity: 0; transition: opacity 0.35s;
  }
  .blow-btn:hover::before { opacity: 1; }
  .blow-btn:hover {
    border-color: var(--pink);
    box-shadow: 0 0 30px rgba(255,77,166,0.4), inset 0 0 20px rgba(255,77,166,0.1);
    transform: translateY(-2px);
  }

  /* ── TRANSITION SCREEN — two side black holes ── */
  #transitionScreen {
    z-index: 20; opacity: 0; pointer-events: none;
    justify-content: space-between; align-items: center;
    padding: 0 clamp(10px, 4vw, 60px);
  }
  #transitionScreen.active {
    pointer-events: all;
    animation: transIn 0.3s ease forwards;
  }
  @keyframes transIn { to { opacity: 1; } }

  .blackhole-wrap {
    position: relative; display: flex; align-items: center; justify-content: center;
    width: clamp(160px, 28vw, 280px); height: clamp(160px, 28vw, 280px);
    flex-shrink: 0;
  }
  .blackhole-wrap.right { transform: scaleX(-1); }

  .accretion {
    position: absolute; border-radius: 50%;
    animation: accreteSpin linear infinite;
  }
  .accretion:nth-child(1) {
    width: 88%; height: 36%;
    background: conic-gradient(from 0deg, transparent 30%, rgba(255,150,0,0.9) 45%, rgba(255,220,50,1) 50%, rgba(255,150,0,0.9) 55%, transparent 70%);
    filter: blur(4px); animation-duration: 3s;
  }
  .accretion:nth-child(2) {
    width: 76%; height: 30%;
    background: conic-gradient(from 180deg, transparent 30%, rgba(255,80,166,0.7) 45%, rgba(200,100,255,0.9) 50%, rgba(255,80,166,0.7) 55%, transparent 70%);
    filter: blur(6px); animation-duration: 4.5s; animation-direction: reverse;
  }
  .accretion:nth-child(3) {
    width: 96%; height: 24%;
    background: conic-gradient(from 90deg, transparent 35%, rgba(0,200,255,0.4) 48%, rgba(100,220,255,0.6) 50%, rgba(0,200,255,0.4) 52%, transparent 65%);
    filter: blur(8px); animation-duration: 7s;
  }
  @keyframes accreteSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .bh-core {
    position: relative; z-index: 5;
    width: 38%; height: 38%; border-radius: 50%;
    background: radial-gradient(circle, #000 55%, rgba(10,0,20,0.9) 75%, transparent 100%);
    box-shadow:
      0 0 0 4px rgba(255,150,0,0.3), 0 0 30px rgba(255,150,0,0.5),
      0 0 80px rgba(155,93,229,0.4), inset 0 0 30px rgba(0,0,0,1);
    animation: coreBreath 2s ease-in-out infinite;
  }
  @keyframes coreBreath {
    0%,100%{box-shadow:0 0 0 4px rgba(255,150,0,0.3),0 0 30px rgba(255,150,0,0.5),0 0 80px rgba(155,93,229,0.4),inset 0 0 30px rgba(0,0,0,1);}
    50%{box-shadow:0 0 0 8px rgba(255,150,0,0.5),0 0 60px rgba(255,150,0,0.8),0 0 120px rgba(155,93,229,0.6),inset 0 0 30px rgba(0,0,0,1);}
  }

  .grav-lens {
    position: absolute; width: 60%; height: 60%; border-radius: 50%;
    border: 1px solid rgba(255,200,100,0.15);
    animation: lensD 5s ease-in-out infinite;
  }
  @keyframes lensD {
    0%,100%{transform:scale(1) skew(0deg);} 50%{transform:scale(1.05) skew(1deg);}
  }

  /* center text between holes */
  .trans-mid {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
  }
  .trans-mid .t-emoji {
    font-size: clamp(36px, 6vw, 56px);
    animation: floatE 2s ease-in-out infinite;
  }
  @keyframes floatE { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .trans-mid p {
    font-family: 'Cinzel', serif; font-size: clamp(12px, 1.8vw, 18px);
    letter-spacing: 0.2em; color: rgba(255,214,255,0.7);
    text-shadow: 0 0 20px rgba(155,93,229,0.8);
    animation: tpulse 1.5s ease-in-out infinite;
    text-align: center;
  }
  @keyframes tpulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

  /* ── FINAL SCREEN ── */
  #finalScreen {
    z-index: 15; opacity: 0; pointer-events: none;
    align-items: center; justify-content: center; overflow: hidden;
  }
  #finalScreen.visible {
    opacity: 1; pointer-events: all; transition: opacity 2s ease;
  }

  @keyframes floatObj {
    0%,100%{transform:translateY(0) rotate(0deg);}
    33%{transform:translateY(-20px) rotate(8deg);}
    66%{transform:translateY(-8px) rotate(-5deg);}
  }

  .personal-photo {
    position: absolute;
    border-radius: 18px;
    object-fit: contain;
    width: auto;
    pointer-events: none;
    animation: floatObj ease-in-out infinite;
    border: 2px solid rgba(255,77,166,0.5);
    box-shadow: 0 0 24px rgba(255,77,166,0.45), 0 0 50px rgba(155,93,229,0.35);
    background: transparent;
  }
  .ph1 { height: 220px; top:4%;    left:1%;   animation-duration:12s; animation-delay:0s; }
  .ph2 { height: 200px; bottom:6%; left:2%;   animation-duration:9s;  animation-delay:1s; }
  .ph3 { height: 240px; top:3%;    right:1%;  animation-duration:14s; animation-delay:2s; }
  .ph4 { height: 210px; bottom:6%; right:2%;  animation-duration:10s; animation-delay:0.5s; }

  .final-layout {
    position: relative; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  .message-card {
    position: relative; z-index: 20;
    width: min(720px, 88vw); max-height: 82vh;
    padding: 44px 48px; border-radius: 28px;
    background: rgba(5,1,13,0.72); backdrop-filter: blur(18px);
    border: 1px solid rgba(255,77,166,0.2);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04), 0 0 60px rgba(255,77,166,0.15),
      0 0 120px rgba(155,93,229,0.1), inset 0 1px 0 rgba(255,255,255,0.06);
    overflow-y: auto;
    animation: cardAppear 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0; transform: translateY(30px) scale(0.97);
  }
  @keyframes cardAppear { to { opacity:1; transform:translateY(0) scale(1); } }
  .message-card::-webkit-scrollbar { width: 4px; }
  .message-card::-webkit-scrollbar-thumb { background: rgba(255,77,166,0.4); border-radius: 10px; }

  .card-corner { position: absolute; width: 24px; height: 24px; pointer-events: none; }
  .card-corner::before,.card-corner::after { content:''; position:absolute; background:var(--pink); border-radius:2px; }
  .card-corner::before { width:100%; height:1px; }
  .card-corner::after  { width:1px; height:100%; }
  .card-corner.tl{top:16px;left:16px;} .card-corner.tr{top:16px;right:16px;transform:scaleX(-1);}
  .card-corner.bl{bottom:16px;left:16px;transform:scaleY(-1);} .card-corner.br{bottom:16px;right:16px;transform:scale(-1);}

  .msg-title {
    font-family:'Cinzel',serif; font-size:clamp(18px,2.8vw,26px);
    letter-spacing:0.2em; color:var(--gold);
    text-shadow:0 0 20px rgba(255,215,0,0.5); margin-bottom:6px; text-align:center;
  }
  .msg-subtitle {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:15px; color:rgba(255,214,255,0.45);
    letter-spacing:0.1em; text-align:center; margin-bottom:32px;
  }
  .divider {
    width:100%; height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,77,166,0.4),rgba(155,93,229,0.4),transparent);
    margin:24px 0;
  }
  .msg-body {
    font-family:'Cormorant Garamond',serif; font-size:clamp(17px,2vw,21px);
    line-height:1.85; color:rgba(255,214,255,0.88); font-weight:300;
  }
  .msg-line {
    display:block; opacity:0; transform:translateY(10px);
    animation:lineReveal 0.6s ease forwards;
  }
  .msg-highlight{color:var(--gold);font-style:italic;}
  .msg-pink{color:var(--pink);}
  .msg-cyan{color:var(--cyan);}
  @keyframes lineReveal { to{opacity:1;transform:translateY(0);} }

  .msg-sign {
    margin-top:28px; text-align:center;
    font-family:'Playfair Display',serif; font-style:italic;
    font-size:22px; color:var(--pink); text-shadow:0 0 20px rgba(255,77,166,0.5);
  }

  /* shooting stars */
  .shoot {
    position:absolute; width:3px; height:3px; border-radius:50%;
    background:white; animation:shootStar linear infinite; pointer-events:none;
  }
  @keyframes shootStar {
    0%{transform:translate(0,0);opacity:1;box-shadow:none;}
    100%{transform:translate(-300px,200px);opacity:0;
         box-shadow:150px -100px 0 0 rgba(255,255,255,0.3),100px -70px 0 0 rgba(255,255,255,0.2);}
  }

  .particle {
    position:fixed; width:6px; height:6px; border-radius:50%;
    pointer-events:none; animation:burst var(--d) ease forwards; opacity:1; z-index:999;
  }
  @keyframes burst {
    0%{transform:translate(0,0) scale(1);opacity:1;}
    100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}
  }

  .telescope {
    position:absolute; bottom:24px; right:28px; font-size:32px;
    opacity:0.35; animation:teleSway 4s ease-in-out infinite; pointer-events:none;
  }
  @keyframes teleSway{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}

  .scroll-hint {
    position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    font-size:12px; letter-spacing:0.15em; color:rgba(255,214,255,0.3);
    font-family:'Cinzel',serif; animation:hintFade 2s ease-in-out infinite; pointer-events:none;
  }
  @keyframes hintFade{0%,100%{opacity:0.3}50%{opacity:0.7}}

  /* ── Music player ── */
  .music-player {
    position:fixed; bottom:24px; left:24px; z-index:100;
    display:flex; align-items:center; gap:10px;
    padding:10px 18px; border-radius:50px;
    background:rgba(5,1,13,0.75); backdrop-filter:blur(12px);
    border:1px solid rgba(255,77,166,0.3);
    box-shadow:0 0 20px rgba(255,77,166,0.2);
    opacity:0; transition:opacity 1s ease;
  }
  .music-player.show { opacity:1; }
  .music-toggle {
    background:none; border:none; cursor:pointer;
    font-size:22px; line-height:1; padding:0;
  }
  .music-label {
    font-family:'Cinzel',serif; font-size:11px;
    letter-spacing:0.15em; color:rgba(255,214,255,0.6);
  }
  .music-bars { display:flex; align-items:flex-end; gap:3px; height:18px; }
  .music-bars span {
    width:3px; background:var(--pink); border-radius:2px;
    animation:barDance 0.8s ease-in-out infinite;
  }
  .music-bars span:nth-child(1){height:6px;animation-delay:0s;}
  .music-bars span:nth-child(2){height:14px;animation-delay:0.15s;}
  .music-bars span:nth-child(3){height:10px;animation-delay:0.3s;}
  .music-bars span:nth-child(4){height:16px;animation-delay:0.45s;}
  .music-bars span:nth-child(5){height:8px;animation-delay:0.1s;}
  @keyframes barDance{0%,100%{transform:scaleY(1);}50%{transform:scaleY(0.3);}}
  .music-bars.paused span{animation-play-state:paused;}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div class="nebula"></div>

<!-- Music -->
<div class="music-player" id="musicPlayer">
  <button class="music-toggle" id="musicToggle" onclick="toggleMusic()">🎵</button>
  <div class="music-label">Birthday Song</div>
  <div class="music-bars" id="musicBars">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</div>
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- ═══ START SCREEN ═══ -->
<div class="screen" id="startScreen">
  <div class="orbit-ring"><div class="orbit-dot"></div></div>
  <div class="orbit-ring"><div class="orbit-dot"></div></div>
  <div class="orbit-ring"><div class="orbit-dot"></div></div>
  <div class="start-center">
    <div class="flame-container">
      <div class="flame" style="animation-delay:0.05s"></div>
      <div class="flame" style="animation-delay:0.1s;height:28px;"></div>
      <div class="flame" style="animation-delay:0s"></div>
    </div>
    <div class="cake-emoji">🎂</div>
    <div class="start-title">Happy Birthday</div>
    <div class="start-sub">to my cosmic partner in stardust</div>
    <button class="blow-btn" onclick="blowCandle()">💨 &nbsp;Blow the Candle</button>
  </div>
</div>

<!-- ═══ TRANSITION SCREEN ═══ -->
<div class="screen" id="transitionScreen">

  <!-- Left black hole -->
  <div class="blackhole-wrap left">
    <div class="accretion"></div>
    <div class="accretion"></div>
    <div class="accretion"></div>
    <div class="grav-lens"></div>
    <div class="bh-core"></div>
  </div>

  <!-- Center -->
  <div class="trans-mid">
    <div class="t-emoji">🌌</div>
    <p>Travelling through</p>
    <p>the cosmos…</p>
  </div>

  <!-- Right black hole (mirrored) -->
  <div class="blackhole-wrap right">
    <div class="accretion"></div>
    <div class="accretion"></div>
    <div class="accretion"></div>
    <div class="grav-lens"></div>
    <div class="bh-core"></div>
  </div>

</div>

<!-- ═══ FINAL SCREEN ═══ -->
<div class="screen" id="finalScreen">
  <div class="final-layout">

    <!-- Your photos floating as cosmic orbs -->
    <img class="personal-photo ph1" src="1.jpeg" alt="" onerror="this.style.display='none'">
    <img class="personal-photo ph2" src="2.jpeg" alt="" onerror="this.style.display='none'">
    <img class="personal-photo ph3" src="3.jpeg" alt="" onerror="this.style.display='none'">
    <img class="personal-photo ph4" src="4.jpeg" alt="" onerror="this.style.display='none'">

    <!-- Shooting stars -->
    <div class="shoot" style="top:12%;right:20%;animation-duration:4s;animation-delay:0.5s;"></div>
    <div class="shoot" style="top:28%;right:40%;animation-duration:6s;animation-delay:2s;"></div>
    <div class="shoot" style="top:55%;right:10%;animation-duration:5s;animation-delay:3.5s;"></div>

    <!-- Message card -->
    <div class="message-card" id="msgCard">
      <div class="card-corner tl"></div>
      <div class="card-corner tr"></div>
      <div class="card-corner bl"></div>
      <div class="card-corner br"></div>

      <div class="msg-title">🎉 Happy Birthday 🌌</div>
      <div class="msg-subtitle">to my cosmic partner in stardust</div>
      <div class="divider"></div>
      <div class="msg-body" id="msgBody"></div>
      <div class="divider"></div>
      <div class="msg-sign">— with love &amp; infinite stardust 💖</div>
    </div>

    <div class="telescope">🔭</div>
    <div class="scroll-hint">scroll to read ↓</div>
  </div>
</div>

<script>
/* ── STARFIELD ── */
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');
let stars = [];
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length:220}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    r: Math.random()*1.8+0.2, a: Math.random(),
    speed: Math.random()*0.004+0.002,
    hue: Math.random()>0.85 ? `hsl(${Math.random()*60+280},80%,90%)` : 'white'
  }));
}
window.addEventListener('resize', resize);
resize();
function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s => {
    s.a += s.speed;
    const alpha = (Math.sin(s.a)*0.5+0.5)*0.85+0.1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = s.hue==='white'
      ? `rgba(255,255,255,${alpha})`
      : s.hue.replace(')',',' + alpha+')').replace('hsl','hsla');
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

/* ── PARTICLES ── */
function spawnParticles() {
  const btn = document.querySelector('.blow-btn');
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  const colors = ['#ff4da6','#ffd700','#9b5de5','#00f5ff','#ff66cc','#fff'];
  for (let i=0; i<40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random()*Math.PI*2;
    const dist  = 80 + Math.random()*160;
    const dur   = (0.6+Math.random()*0.8)+'s';
    p.style.cssText = `left:${cx}px;top:${cy}px;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--d:${dur};`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), parseFloat(dur)*1000+100);
  }
}

/* ── MESSAGE ── */
const lines = [
  { text:"You have been such a wonderful friend to me… ❤️", cls:"" },
  { text:"An extrovert who brought light into my introvert world ✨", cls:"" },

function buildMessage() {
  const body = document.getElementById('msgBody');
  body.innerHTML = '';
  lines.forEach((l,i) => {
    const span = document.createElement('span');
    span.className = `msg-line ${l.cls}`;
    span.style.animationDelay = `${0.3+i*0.12}s`;
    if (l.text==='') { span.innerHTML='&nbsp;'; span.style.height='8px'; }
    else span.innerHTML = l.text;
    body.appendChild(span);
  });
}

/* ── MUSIC ── */
let musicPlaying = false;
const audio = document.getElementById('bgMusic');
function toggleMusic() {
  if (musicPlaying) {
    audio.pause();
    document.getElementById('musicToggle').textContent='🔇';
    document.getElementById('musicBars').classList.add('paused');
    musicPlaying = false;
  } else {
    audio.play().catch(()=>{});
    document.getElementById('musicToggle').textContent='🎵';
    document.getElementById('musicBars').classList.remove('paused');
    musicPlaying = true;
  }
}
function startMusic() {
  audio.volume = 0.75;
  audio.play().then(()=>{
    musicPlaying = true;
    document.getElementById('musicBars').classList.remove('paused');
  }).catch(()=>{ musicPlaying=false; });
  document.getElementById('musicPlayer').classList.add('show');
}

/* ── BLOW ── */
function blowCandle() {
  spawnParticles();
  const start = document.getElementById('startScreen');
  const trans = document.getElementById('transitionScreen');
  const final = document.getElementById('finalScreen');
  start.classList.add('hidden');
  trans.classList.add('active');
  setTimeout(()=>{
    buildMessage();
    trans.style.transition = 'opacity 1s ease';
    trans.style.opacity = '0';
    trans.style.pointerEvents = 'none';
    final.classList.add('visible');
    startMusic();
  }, 2800);
}
